<!DOCTYPE html>

<html lang="en" style="margin:0; padding:0; height: 100%;">
    <head>
        <!-- Set this page (hopefully) to not be cached, so it gets reloaded each time the browser refreshes / reloads / reboots.
        Seems to be of particular importance for ChromeOS kisok-mode devices, which seem to cache content between reboots. -->
        <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
        <meta http-equiv="Pragma" content="no-cache"/>
        <meta http-equiv="Expires" content="0"/>
        
        <script>
            var nextSlideInterval = 1;
            
            var currentSlide = -1;
            var slideTransitionTime = 20000;
            var slideFadeStep = 0.05;
            var slideFadeInterval = 200;
            var clickRequired = false;
            var resources = [];

            // A function to check if a given file / URL exists (server-side). See:
            // https://www.kirupa.com/html5/checking_if_a_file_exists.htm
            function doesFileExist(urlToFile) {
                console.log("Checking for " + urlToFile);
                var xhr = new XMLHttpRequest();
                xhr.open('HEAD', urlToFile, false);
                xhr.send();
                
                console.log(xhr.status);
                if (xhr.status == "404") {
                    return false;
                } else {
                    return true;
                }
            }
            
            // An interval function, along with some global variables, to fade between slides.
            var opacity = 1;
            var fadeStartSlide = 1;
            var fadeEndSlide = 1;
            var fadeInterval = 1;
            function fadeSlides() {
                fadeStartSlide.style.opacity = opacity;
                fadeEndSlide.style.opacity = 1 - opacity;
                opacity = opacity - slideFadeStep;
                if (opacity <= 0) {
                    clearInterval(fadeInterval);
                    fadeStartSlide.style.opacity = 0;
                    fadeStartSlide.style.display = "none";
                    fadeEndSlide.style.opacity = 1;
                }
            }
            
            // Display the next slide.
            function showNextSlide() {
                // Clear the current next-slide transition time...
                clearInterval(nextSlideInterval);
                // ...and set up the next one. If the "clickRequired" parameter is set, we don't set up
                // the next slide transition yet, we wait until the user clicks on the current slide.
                if (!clickRequired) {
                    nextSlideInterval = setInterval(showNextSlide, slideTransitionTime);
                }
                
                nextSlide = currentSlide + 1;
                if (nextSlide == resources.length) {
                    nextSlide = 0;
                }

                // If the next slide is a video, and "clickRequired" is set, make sure the video is
                // stopped and ready to play from the start.
                if (resources[nextSlide].endsWith(".mp4") && clickRequired) {
                    nextVideoElement = document.getElementById("slide-" + nextSlide).childNodes[0];
                    nextVideoElement.pause();
                    nextVideoElement.currentTime = 0;
                }

                // Set up the fade effect between the current slide and the next - skip if there's only one slide and we're already showing it.
                if (!(resources.length == 1 && currentSlide == 0)) {
                    opacity = 1;
                    fadeStartSlide = document.getElementById("slide-" + currentSlide);
                    fadeEndSlide = document.getElementById("slide-" + nextSlide);
                    fadeEndSlide.style.opacity = 0;
                    fadeEndSlide.style.display = "block";
                    fadeInterval = setInterval(fadeSlides, 200);
                }
                
                currentSlide = nextSlide;
            }

            function handleClickOrPress(theEvent) {
                //if (event.clientX < Math.floor(window.innerWidth / 2)) {
                    // Left!
                //} else {
                    // Right!
                //}
                nextSlideInterval = setInterval(showNextSlide, slideTransitionTime);
                if (resources[currentSlide].endsWith(".mp4")) {
                    currentVideoElement = document.getElementById("slide-" + currentSlide).childNodes[0];
                    videoPlaying = !!(currentVideoElement.currentTime > 0 && !currentVideoElement.paused && !currentVideoElement.ended && currentVideoElement.readyState > 2);
                    if (videoPlaying) {
                        currentVideoElement.pause();
                        currentVideoElement.currentTime = 0;
                    } else {
                        currentVideoElement.play();
                    }
                }
            }
            
            // The page load function - execution starts here.
            function startSlides() {
                pageRefreshed = false;
                
                // Extract any optional parameters from the URL.
                const searchParams = new URLSearchParams(window.location.search);
                for (const searchParam of searchParams) {
                    paramName = searchParam[0].toLowerCase()
                    if (paramName == "transition") {
                        slideTransitionTime = parseInt(searchParam[1]) * 1000;
                    } else if (paramName == "fadesteps") {
                        slideFadeStep = 1 / parseInt(searchParam[1]);
                    } else if (paramName == "fadeinterval") {
                        slideFadeInterval = Number(searchParam[1]) * 1000;
                    } else if (paramName == "refreshed") {
                        if (searchParam[1].toLowerCase() == "true") {
                            pageRefreshed = true;
                        }
                    } else if (paramName == "clickrequired") {
                        if (searchParam[1].toLowerCase() == "true") {
                            clickRequired = true;
                        }
                    }
                }
                
                if (!pageRefreshed) {
                    location.replace(window.location.protocol + "//" + window.location.hostname + ":" + window.location.port + window.location.pathname.replace(/\/$/, "") + "?transition=" + (slideTransitionTime/1000) + "&fadesteps=" + (1/slideFadeStep) + "&fadeinterval=" + (slideFadeInterval/1000) + "&clickRequired=" + clickRequired.toString() + "&refreshed=true");
                }

                console.log(resources);
                
                if (resources == []) {
                    if (doesFileExist("content.mp4")) {
                        resources = ["content.mp4"];
                    }
                }
                
                if (resources == []) {
                    console.log("Error: unable to find any resources to load.")
                }

                console.log(resources);
                
                // We want to tell the user what resources we're loading.
                resourceList = document.getElementById("resourceList");
                resource0 = document.getElementById("resource-0");
                
                // Clone a "slide" DIV for each slide and set the content, this should get the content pre-loaded so there's no wait for
                // content to load when switching from one slide to another.
                slidesDiv = document.getElementById("slides");
                slideDiv = document.getElementById("slide");
                for (slideNum = 0; slideNum < resources.length; slideNum = slideNum + 1) {
                    newResourceListItem = resource0.cloneNode();
                    newResourceListItem.id = "resource-" + slideNum;
                    newResourceListItem.innerHTML = resources[slideNum];
                    resourceList.appendChild(newResourceListItem);
                    
                    newSlideDiv = slideDiv.cloneNode();
                    newSlideDiv.id = "slide-" + slideNum;
                    newSlideDiv.style.display = "none";
                    if (resources[slideNum].endsWith(".svg")) {
                        newSlideDiv.innerHTML = "<img src=\"" + resources[slideNum] + "\" width=\"100%\"/>";
                    } else if (resources[slideNum].endsWith(".mp4")) {
                        if (clickRequired) {
                            newSlideDiv.innerHTML = "<video width=\"100%\" height=\"100%\"><source src=\"" + resources[slideNum] + "\" type=\"video/mp4\"></video>";
                        } else {
                            newSlideDiv.innerHTML = "<video width=\"100%\" height=\"100%\" autoplay loop><source src=\"" + resources[slideNum] + "\" type=\"video/mp4\"></video>";
                        }
                    } else if (resources[slideNum].endsWith(".html")) {
                        newSlideDiv.innerHTML = "<iframe src=\"" + resources[slideNum] + "\" style=\"width:100vw; height:100vh; overflow-y:hidden; overflow-x:hidden;\"></iframe>";
                    }
                    slidesDiv.appendChild(newSlideDiv);
                    if (resources[slideNum].endsWith(".mp4") && clickRequired) {
                        document.getElementById("slide-" + slideNum).childNodes[0].addEventListener("click", handleClickOrPress);
                    }
                }
                resource0.style.display = "none";
                // Make sure the intial slide is visible.
                document.getElementById("slide--1").style.display = "block";
                // Set up the slide transition.
                nextSlideInterval = setInterval(showNextSlide, slideTransitionTime);
            }
        </script>
    </head>
    <body onload="startSlides()" style="margin:0; padding:0; height:100vh; max-height:100vh; float:left; width:100vw; overflow-y:hidden; overflow-x:hidden;">
        <div id="slides" style="width:100px; height:100px; background-color:rgb(255,255,255); cursor:url(data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7), auto;">
            <div id="slide--1" style="position:absolute; top:0; left:0; width:100vw; height:100vh; overflow-y:hidden; overflow-x:hidden;">
                <p><h1>Slideshow</h1></p>
                <p><h2>Open source software - see: https://github.com/dhicks6345789/docs-to-markdown</h2></p>
                <p>Timestamp: <<TIMESTAMP>></p>
                <p>Date / Time: <<DATETIMEFORMATTED>></p>
                <p>
                    Resources:
                    <ul id="resourceList">
                        <li id="resource-0"></li>
                    </ul>
                </p>
            </div>
            <div id="slide" style="position:absolute; top:0; left:0; width:100vw; height:100vh; overflow-y:hidden; overflow-x:hidden;">
            </div>
        </div>
    </body>
</html>

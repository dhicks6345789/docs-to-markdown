<!DOCTYPE html>

<!-- The main HTML element - set margins to 0 and size to 100% so it fills the whole page (or whole screen in full-screen mode). -->
<html lang="en" style="margin:0; padding:0; height:100%;">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

        <!-- Set this page (hopefully) to not be cached, so it gets reloaded each time the browser refreshes / reloads / reboots.
        Seems to be of particular importance for ChromeOS kisok-mode devices, which seem to cache content between reboots. -->
        <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
        <meta http-equiv="Pragma" content="no-cache"/>
        <meta http-equiv="Expires" content="0"/>
        
        <title>Audio Cues</title>
            
        <!-- Our user interface is constructed with Bootstrap 5, including Popper 2. -->
        <link rel="stylesheet" href="/bootstrap/5.1.3/css/bootstrap.min.css">
        <script src="/popper/2.11.5/popper.min.js"></script>
        <script src="/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
        
        <script>
            // By default, as a stand-alone application, the "resources" array will be empty. The server-side script replaces this line with a list
            // of resources, or some later code will try to find resources.
            var resources = [];
            var audioObjects = [];

            // A function to check if a given file / URL exists (server-side). See:
            // https://www.kirupa.com/html5/checking_if_a_file_exists.htm
            function doesFileExist(urlToFile) {
                var xhr = new XMLHttpRequest();
                xhr.open('HEAD', urlToFile, false);
                xhr.send();
                
                if (xhr.status == "404") {
                    return false;
                } else {
                    return true;
                }
            }

            function playPauseAudio(theResource) {
                audioPlayer = audioObjects[theResource-1]["audioPlayer"];
                playerButton = audioObjects[theResource-1]["playerButton"];
                playerIcon = audioObjects[theResource-1]["playerIcon"];
                audioObject = audioObjects[theResource-1]["audioObject"];
                
                if (playerIcon.getAttribute("src") == "/bootstrap-icons/1.8.1/play.svg") {
                    playerButton.className = "btn btn-warning";
                    playerIcon.setAttribute("src", "/bootstrap-icons/1.8.1/pause.svg");
                    audioObject.play();
                } else {
                    playerButton.className = "btn btn-success";
                    playerIcon.setAttribute("src", "/bootstrap-icons/1.8.1/play.svg");
                    audioObject.pause();
                }
            }
            
            function rewindAudio(theResource) {
                audioPlayer = audioObjects[theResource-1]["audioPlayer"];
                playerButton = audioObjects[theResource-1]["playerButton"];
                playerIcon = audioObjects[theResource-1]["playerIcon"];
                audioObject = audioObjects[theResource-1]["audioObject"];
                
                playerButton.className = "btn btn-success";
                playerIcon.setAttribute("src", "/bootstrap-icons/1.8.1/play.svg");
                audioObject.pause();
                audioObject.currentTime = 0;
            }
            
            function showOptions(theResource) {
                console.log("Show: " + theResource);
            }
            
            // The page load function - execution starts here.
            function startApp() {
                // If we don't already have resources defined (which we might have, if this file is being used as a template from a server-side script), try and find some.
                if (resources.length == 0) {
                    // Load resources.
                    if (doesFileExist("index.csv")) {
                        resources = ["content.mp4"];
                    }
                }
                
                // If we still haven't managed to find any resources to display, report an error.
                if (resources.length == 0) {
                    document.getElementById("errorMessage").innerHTML = "Error: Unable to find any resources to load.";
                } else {
                    // Step through the resources, setting up an audio player on the page for each one.
                    itemCount = 0;
                    for (resource = 0; resource < resources.length; resource = resource + 1) {
                        if (resources[resource][0] != "Filename") {
                            itemCount = itemCount + 1;
                            if (itemCount == 1 || itemCount % 6 == 1) {
                                newRow = document.getElementById("row-0").cloneNode(true);
                                newRow.id = "row-" + (Math.floor(itemCount / 6) + 1);
                                newRow.childNodes[1].id = "resource-" + itemCount;
                                newRow.childNodes[3].id = "resource-" + (itemCount+1);
                                newRow.childNodes[5].id = "resource-" + (itemCount+2);
                                newRow.childNodes[7].id = "resource-" + (itemCount+3);
                                newRow.childNodes[9].id = "resource-" + (itemCount+4);
                                newRow.childNodes[11].id = "resource-" + (itemCount+5);
                                document.getElementById("playerRows").appendChild(newRow);
                                newRow.style.display = "";
                            }
                            newPlayer = document.getElementById("audioPlayer-0").cloneNode(true);
                            newPlayer.id = "audioPlayer-" + itemCount;
                            newPlayer.innerHTML = newPlayer.innerHTML.replaceAll("{{TITLE}}", resources[resource][1]).replaceAll("(0)","(" + resource + ")");
                            document.getElementById("resource-" + itemCount).appendChild(newPlayer);
                            newPlayer.style.display = "";
                            if (resources[resource][5] != "") {
                                newPlayer.style.backgroundImage = "url(\'" + resources[resource][5] + "\')";
                            } else {
                                newPlayer.style.backgroundImage = "url(\'/bootstrap-icons/1.8.1/soundwave.svg\')";
                            }
                            newPlayer.style.backgroundPosition = "center center";
                            newPlayer.style.backgroundSize = "100% 100%";
                            newPlayer.style.backgroundRepeat = "no-repeat";

                            // Now, add the HTML audio element to the player.
                            newAudioObject = document.createElement("AUDIO");
                            newAudioObject.src = resources[resource][0];
                            newAudioObject.load();
                            newAudioObject.onended = Function("rewindAudio(" + resource + ")");
                            newPlayer.appendChild(newAudioObject);
                            
                            // Once the new audio player is set up on the page, save references to the object for control later on.
                            audioObjects.push({"audioPlayer":newPlayer, "playerButton":newPlayer.childNodes[3].childNodes[1], "playerIcon":newPlayer.childNodes[3].childNodes[1].childNodes[0], "audioObject":newAudioObject});
                        }
                    }
                }
            }
        </script>
    </head>
    <!-- The main body element - again, we set width and height to fit the whole page / screen, and we hide any scrollbars. -->
    <body onload="startApp()" style="margin:0; padding:0; height:100vh; max-height:100vh; float:left; width:100vw; overflow-x:hidden;">
    <body>
        <div id="audioPlayer-0" class="bg text-center" style="margin:0; padding:0; height:100%; width:100%; display:none;">
            <div style="height:5.8vw;"><span style="background-color:white; opacity:0.5;">{{TITLE}}</span></div>
            <div style="height:7.8vw">
                <button type="button" class="btn btn-success" style="opacity:0.9; width:5vw; height:5vw;" onclick="playPauseAudio(0);"><img src="/bootstrap-icons/1.8.1/play.svg" height="100%" width="100%"></button>
            </div>
            <div style="height:3vw">
                <div class="row" style="style="margin:0; padding:0; width:100%">
                    <div class="col text-center">
                        <button type="button" class="btn btn-success" style="opacity:0.9; width:3vw; height:3vw;"><img src="/bootstrap-icons/1.8.1/repeat.svg" height="100%" width="100%" onclick="rewindAudio(0);"></button>
                    </div>
                    <div class="col text-center">
                        <button type="button" class="btn btn-success" style="opacity:0.9; width:3vw; height:3vw;"><img src="/bootstrap-icons/1.8.1/three-dots.svg" height="100%" width="100%" onclick="showOptions(0);"></button>
                    </div>
                </div>
            </div>
        </div>
        <div id="playerRows" style="margin:0; padding:0; height:16.6vw; width:100%;">
            <div id="row-0" class="row g-0" style="margin:0; padding:3; height:16.6vw; width:100%; display:none;">
                <div id="resource-01" class="col" style="width:16.7vw; height:100%;"></div>
                <div id="resource-02" class="col" style="width:16.7vw; height:100%;"></div>
                <div id="resource-03" class="col" style="width:16.6vw; height:100%;"></div>
                <div id="resource-04" class="col" style="width:16.6vw; height:100%;"></div>
                <div id="resource-05" class="col" style="width:16.7vw; height:100%;"></div>
                <div id="resource-06" class="col" style="width:16.7vw; height:100%;"></div>
            </div>
        </div>
    </body>
</html>
